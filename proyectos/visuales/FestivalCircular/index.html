<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Circular 2025 - Visuales</title>
    <link rel="stylesheet" href="../../../assets/css/styles.css">
    <link rel="icon" href="../../../assets/img/logos/Logo.png">
</head>
<body class="info-body">

<nav class="navbar">
    <div class="nav-logo">
        <a href="../../../">
            <img decoding="async" src="../../../assets/img/logos/logoblanco.png" alt="Logo">
        </a>
    </div>
    <ul class="nav-links">
        <li><a href="../../../">inicio</a></li>
        <li><a href="../../../proyectos/">proyectos</a></li>
        <li><a href="../../../Info/">info</a></li>
    </ul>
    <div class="nav-spacer"></div>
</nav>

<a class="project-back" href="../">&larr; visuales</a>

<div class="project-page">
    <div class="project-description">
        <h2>Festival Circular 2025</h2>
        <p>Banner animado para festival.</p>
    </div>

    <div class="gallery">
        <video class="gallery-video" autoplay muted loop playsinline preload="metadata">
            <source src="../../../assets/video/optimized/MotionGraphics/FestivalCircular/BANNER ART.webm" type="video/webm">
        </video>
        <video class="gallery-video" autoplay muted loop playsinline preload="metadata">
            <source src="../../../assets/video/optimized/MotionGraphics/FestivalCircular/POST.webm" type="video/webm">
        </video>
        <img class="gallery-img" src="../../../assets/img/webp/MotionGraphics/FestivalCircular/POSTER 1.webp" alt="Festival Circular poster principal" loading="lazy" decoding="async">
        <img class="gallery-img" src="../../../assets/img/webp/MotionGraphics/FestivalCircular/POSTER TALLER.webp" alt="Festival Circular poster taller" loading="lazy" decoding="async">
        <img class="gallery-img" src="../../../assets/img/webp/MotionGraphics/FestivalCircular/STORY VISITA.webp" alt="Festival Circular story visita" loading="lazy" decoding="async">
    </div>
</div>

<div id="imageModal" class="modal">
    <button class="close">&times;</button>
    <img class="modal-content" id="modalImg" alt="">
</div>

<script src="../../../assets/js/gallery.js"></script>
</body>
</html>
